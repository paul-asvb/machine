# $HOME/.config/hypr/hyprland.conf
# Mirrors sway.conf, with hy3 providing i3/sway-style tiling.
# https://github.com/outfoxxed/hy3

input {
    # query the available layouts: `localectl list-x11-keymap-layouts`
    kb_layout = de
}

# use hy3 as the tiling layout
general {
    layout = hy3
}

# sway-style keybindings (i3 defaults), using hy3 dispatchers for tiling.
# vim-style direction keys, matching sway's $left/$down/$up/$right.
$mod = SUPER
$term = /bin/zsh
$menu = wofi --show drun

bind = $mod, Return, exec, alacritty --config-file $HOME/.config/alacritty/alacritty.toml
bind = $mod SHIFT, Q, hy3:killactive
bind = $mod, D, exec, $menu
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, E, exit,

# drag/resize floating windows with $mod (sway's floating_modifier)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# move focus
bind = $mod, H, hy3:movefocus, l
bind = $mod, J, hy3:movefocus, d
bind = $mod, K, hy3:movefocus, u
bind = $mod, L, hy3:movefocus, r
bind = $mod, Left,  hy3:movefocus, l
bind = $mod, Down,  hy3:movefocus, d
bind = $mod, Up,    hy3:movefocus, u
bind = $mod, Right, hy3:movefocus, r

# move the focused window
bind = $mod SHIFT, H, hy3:movewindow, l
bind = $mod SHIFT, J, hy3:movewindow, d
bind = $mod SHIFT, K, hy3:movewindow, u
bind = $mod SHIFT, L, hy3:movewindow, r
bind = $mod SHIFT, Left,  hy3:movewindow, l
bind = $mod SHIFT, Down,  hy3:movewindow, d
bind = $mod SHIFT, Up,    hy3:movewindow, u
bind = $mod SHIFT, Right, hy3:movewindow, r

# switch workspace ($mod+0 == workspace 10, like sway)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# move focused window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# layout / splits (sway: b=splith, v=splitv, e=toggle, w=tabbed, s=stacking)
bind = $mod, B, hy3:makegroup, h
bind = $mod, V, hy3:makegroup, v
bind = $mod, E, hy3:changegroup, opposite
bind = $mod, W, hy3:makegroup, tab
bind = $mod, S, hy3:makegroup, tab          # hy3 has no stacking; tabbed is the closest
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, Space, togglefloating
bind = $mod, A, hy3:changefocus, raise      # sway's "focus parent"

# scratchpad -> Hyprland special workspace
bind = $mod SHIFT, Minus, movetoworkspace, special
bind = $mod, Minus, togglespecialworkspace

# resize mode (sway's `$mod+r` mode "resize")
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -10 0
binde = , J, resizeactive, 0 10
binde = , K, resizeactive, 0 -10
binde = , L, resizeactive, 10 0
binde = , Left,  resizeactive, -10 0
binde = , Down,  resizeactive, 0 10
binde = , Up,    resizeactive, 0 -10
binde = , Right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# only for 2 monitors
workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3
workspace = 6, monitor:DP-3
workspace = 7, monitor:DP-3
workspace = 8, monitor:DP-3
workspace = 9, monitor:DP-3
workspace = 10, monitor:DP-3

monitor = DP-3, preferred, auto, 1.5
monitor = DP-2, preferred, auto, 1.5

# for changing the background, configure hyprpaper in ~/.config/hypr/hyprpaper.conf
# curl https://upload.wikimedia.org/wikipedia/commons/a/aa/KuwaitiOilFires-STS037-152-91-%282%29.jpg -o $HOME/.local/share/wallpapers/bg.jpg

# status bar
exec-once = waybar

# Idle configuration (hypridle reads ~/.config/hypr/hypridle.conf)
exec-once = hypridle

exec-once = brightnessctl set 100%
